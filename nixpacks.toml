[phases.setup]
nixPkgs = ["nodejs-20_x", "python311"]

[phases.install]
cmds = [
    "cd frontend && npm ci && cd ..",
    "pip install -e ."
]

[phases.build]
cmds = [
    "cd frontend && npm run build && cd .."
]

[start]
cmd = "python3 -m uvicorn backend.app:app --host 0.0.0.0 --port ${PORT:-8765}"
