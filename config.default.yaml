models:
  primary:
    provider: qwen
    api_key: ""
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: deepseek-v4-flash
    rpm_limit: 60
    tpm_limit: 200000
  fallback:
    provider: qwen
    api_key: ""
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: deepseek-v4-flash
    rpm_limit: 60
    tpm_limit: 200000

extraction:
  granularity: fine
  # v1.2：颗粒度档位 1(粗)–5(极细)，驱动切块大小/拆分策略/跳过门槛/去重/密度提示
  granularity_level: 4
  regulation_depth: full
  consistency_sampling: false
  # v2.0: 即使 consistency_sampling=false，也仅对 risk_level=高 的规则做一致性校验
  consistency_sampling_high_risk_only: true
  industry_preset: null
  industry_vocabulary: ""
  industry_focus_points: ""
  redline_keywords:
    - 红线
    - 不得
    - 禁止
    - 必须
    - 重大
    - 不可转让
    - 无效
    - 无限责任
    - 最高限额
    - 赔偿上限
    - 违约金
    - 损害赔偿
    - 间接损失
    - 仲裁
    - 管辖
    - 法律适用
    - 独占许可
    - 排他许可
    - 永久许可
    - 全球范围
    - 反贿赂
    - 反洗钱
    - 数据出境
    - 个人信息
    - 制裁

priorities:
  weights:
    法规: 1
    公司红线: 2
    内部制度: 3
    标准条款库: 4
    历史合同: 5

confidence:
  threshold_review: 0.7
  # v2.0：六重门加权（合计 1.00）。fidelity 灭数值幻觉，semantic 灭语义幻觉
  # （法律术语/主体名词回溯）。fidelity 权重从 0.30 调为 0.25，腾出 0.15 给 semantic。
  weights:
    self: 0.15
    consistency: 0.25
    struct: 0.15
    conflict: 0.05
    fidelity: 0.25
    semantic: 0.15

concurrency:
  files: 4
  blocks: 8

ocr:
  enabled: false
  engine: paddleocr
  language: ch+en

budget:
  max_tokens_per_batch: 5000000
  pause_on_overrun: true

storage:
  db_path: ./data/harness.sqlite
  exports_dir: ./data/exports
