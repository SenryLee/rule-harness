[build]
# Use the Dockerfile at the repo root (replaces the previous Nixpacks build,
# which failed with "cd frontend: No such file or directory" because Nixpacks
# resets CWD between phases).
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# v1.3: 使用 /health（无 /api 前缀）避开任何 mount / 反向代理路径冲突。
# 该端点同时挂在 /api/health 和 /health，见 backend/app.py。
healthcheckPath = "/health"

# Python + lxml + pdfplumber + PyMuPDF import chain 在小实例上可能要 30-60s。
# 300s 给冷启动充分余量；硬失败仍会自动 restart。
healthcheckTimeout = 300

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
