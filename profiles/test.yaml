focus_points: |
  - 标的物质量标准、验收程序、不合格的处理（退货 / 换货 / 补偿）
  - 付款条件：金额、币种、期限、滞纳金、税票要求
  - 违约金合理性（约定过高可被法院调减 30%、过低可被调增）
  - 损害赔偿范围：直接损失 vs 间接损失 / 可得利益
  - 赔偿上限：是否封顶、封顶基数（合同总价 / 已付款 / 服务费）
  - 不可抗力的范围与通知时限（通常 ≤ 15 日）
  - 单方解除权的条件与通知期
  - 商业秘密 / 保密义务的范围、期限、剩余信息条款
  - 知识产权归属（特别是定制开发 / 委托作品）
  - 通知方式（书面 / 邮件 / 法定代表人地址）与生效时点
  - 争议解决：仲裁机构 / 仲裁规则 / 管辖法院 / 适用法律
priority_overrides:
  违约金: 高
  仲裁: 高
  管辖: 高
  法律适用: 高
