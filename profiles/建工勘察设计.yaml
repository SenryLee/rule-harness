focus_points: |
  - 勘察 / 设计成果的知识产权归属与使用范围（同类工程能否复用）
  - 设计深度是否对应阶段（方案 / 初设 / 施工图）：是否满足招标 / 报建 / 施工要求
  - 限额设计责任：突破限额后的责任划分与费用扣罚
  - 设计变更的发起方（业主 vs 设计方）与变更费分担
  - 现场服务 / 后期配合的次数、时长、计费方式
  - 设计错误导致的损失赔偿上限与终身责任限定
  - 监理见证取样、平行检验的频次与覆盖范围
  - 监理违规处罚（旁站缺失 / 签证失实）的扣款依据
  - 全过程咨询的责任边界（与设计 / 监理 / 招标代理的区分）
  - 设计费按设计阶段分期支付的比例与节点
  - 勘察人因不良地质条件免责的认定门槛（《建工解释二》§14）
priority_overrides:
  违约金: 高
  知识产权: 高
  设计错误: 高
  终身责任: 高
