focus_points: |
  - 投资者适当性义务履行的程序性证据是否完备
  - 关联交易披露与审批
  - 杠杆与衍生品的风险披露
  - 反洗钱（KYC/EDD）流程节点
  - 出表/通道相关条款的实质重于形式判断
  - 受托人信义义务是否被不当限缩
  - 增信措施的法律性质（保证/差补/回购）
  - 场外衍生品主协议与补充协议的一致性
  - 提前终止净额结算条款的可执行性
  - 金融消费者保护的特别规定
priority_overrides:
  数据出境: 高
  关联交易: 高
  制裁: 高
