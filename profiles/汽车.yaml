focus_points: |
  - PPAP / APQP / FMEA 等质量体系文件的交付节点
  - 三包责任：整车 / 零部件 / 易损件的不同保修期与责任主体
  - 召回成本承担（设计缺陷 vs 制造缺陷 vs 装配缺陷）
  - 索赔时效（通常 12 个月或行驶里程上限）与索赔证据
  - 零部件保修期与整车整体保修的衔接
  - 经销商网络规划与区域保护（反垄断风险）
  - 压库 / 销售目标 / 返点的合理性（避免变相违法压价）
  - 配件最低库存与旧件回收义务
  - 新能源动力电池的衰减率保证、回收义务、梯次利用归属
  - 充电桩 / 充电服务的责任分配
priority_overrides:
  三包: 高
  召回: 高
  违约金: 高
  区域保护: 高
