focus_points: |
  - 质量标准的具体引用（GB / ISO / 客户标准），含 PPM 或不良率上限
  - 不良品退换货 / 让步接收 / 索赔程序与时限（通常发现后 30 日内书面提出）
  - 模具 / 工装的产权归属（甲方 / 乙方 / 共有）、维护责任与搬迁条件
  - 模具摊销公式：单价 = 模具费 / 预估产量；订单不足如何补偿
  - 原材料价格波动联动条款：触发阈值（如 ±5%）+ 调价周期
  - 4M 变更（人 / 机 / 料 / 法）通知与客户审批义务
  - 准时交货违约金（日比例 / 单件比例）与紧急订单溢价
  - 排他 / 独家供应的边界（地理 / 客户 / 产品线）+ 反垄断风险
  - 反向工程禁止条款与工艺秘密保护
  - 召回 / 责任分担 / 保险（产品责任险）
priority_overrides:
  违约金: 高
  模具产权: 高
  排他: 高
  召回: 高
