focus_points: |
  - 开源软件的许可证义务是否被评估和遵守（GPL传染性、AGPL网络触发等）
  - SLA中的可用性承诺与赔偿机制是否对等（排除计划内维护、不可抗力等）
  - 验收标准是否客观、可测量、无模糊空间
  - 知识产权归属分配是否清晰（特别是定制开发、二次开发的成果）
  - 数据安全义务和事件响应程序是否完整
  - 源代码托管释放条件是否明确、可触发
  - 供应商锁定风险的缓解措施（数据可移植性、接口标准等）
  - 保修期与维护期的起算、范围和延展机制
  - 个人信息保护合规（跨境传输、数据处理协议、DPIA）
  - 分包商管理与责任承担
priority_overrides:
  知识产权: 高
  数据安全: 高
  开源许可证: 高
