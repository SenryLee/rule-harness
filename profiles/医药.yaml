focus_points: |
  - GCP合规与临床试验主体的法律责任分配
  - 不良事件与严重不良事件的报告时限和程序
  - 跨境人类遗传资源审批/备案的触发条件
  - 药品上市许可持有人（MAH）委托生产/销售的责任边界
  - 研发失败/中止的知识产权处置和数据交付
  - 临床试验数据造假的法律后果与合同防范
  - 集采背景下供应保障与违约处罚的平衡
  - 技术转移中的验证义务和验收标准
  - 药物警戒义务的合同落地与责任分担
  - 专利挑战（PTAB/无效宣告）的商业安排
priority_overrides:
  数据出境: 高
  个人信息: 高
  赔偿上限: 高
