focus_points: |
  - 房屋销售：定金 / 预订金的退还条件与"定金罚则"上限（不超过合同总额 20%）
  - 网签 / 备案完成时点与开发商办证义务时限
  - 实测面积差异比的处理（±3% 内 / 外的不同处理规则）
  - 精装修标准的明确性（品牌 / 型号 / 单价 / 验收）防止以次充好
  - 房屋交付条件（综合验收备案 / 单项验收 / 通水通电）
  - 主体结构保修 70 年、防水 5 年等法定保修期与开发商承诺差异
  - 商铺 / 写字楼租赁的免租期、押金（≤ 2 个月租金）、转租权
  - 提前解约的违约金计算（剩余租金 / 押金扣除 / 装修折旧）
  - 续租优先权的行使时点与租金调整机制
  - 物业费收取标准与公共收益归属
  - 一房二卖 / 阴阳合同 / 借名买房等高发风险的合同防范
priority_overrides:
  违约金: 高
  定金: 高
  按揭: 高
  房屋质量: 高
