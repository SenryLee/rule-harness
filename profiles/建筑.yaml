focus_points: |
  - EPC模式下设计变更的责任归属和计价规则
  - 履约保函的递减机制、可转让性与索赔条件
  - 变更指令是否延期的判断标准和通知时限
  - 质量保证金的返还节点和比例
  - 验收程序与部分验收/甩项验收的安排
  - 工期顺延的条件（发包人原因、不可抗力、异常恶劣气候等）
  - 材料价格上涨的调价机制（市场价格波动风险的分配）
  - 违法分包/转包的法律后果与合同防范
  - 竣工验收后结算周期和逾期审核的后果
  - 实际施工人直接向发包人主张权利的路径
priority_overrides:
  违约金: 高
  损害赔偿: 高
  间接损失: 高
