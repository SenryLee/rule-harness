focus_points: |
  - EPC 模式下设计变更的责任归属与计价规则（业主原因 vs 承包人原因）
  - 履约保函的递减机制、可转让性、独立性与索赔条件
  - 工程变更指令的发起、确认、延期、价格调整四要素是否完备
  - 工期顺延的触发条件（发包人原因 / 不可抗力 / 异常恶劣气候 / 不利物质条件）
  - 进度款节点完整性 + 与里程碑的对应；扣款顺序（农民工工资专户优先）
  - 质保金留存比例（应 ≤ 3% 但常见 5%）、返还节点、缺陷责任期界定
  - 工期延误违约金的日比例上限（避免过高被法院依《民法典》§585 调减）
  - 索赔时效（28 日内书面通知）与证据留存要求
  - 安全生产、文明施工责任分配与扣款条款
  - 材料价格波动风险分配（调价公式 / 价格风险 ±5% 内不调）
  - 违法分包 / 转包 / 黑白合同的法律后果与合同防范
  - 实际施工人向发包人主张工程款的路径（《建工解释一》§43）
  - 农民工工资支付保证金、专户、总包人代发义务
  - 竣工验收备案的法定要件与"以使用代验收"的认定
priority_overrides:
  违约金: 高
  损害赔偿: 高
  间接损失: 高
  优先受偿权: 高
