focus_points: |
  - 并网点划分（投资界面 / 产权界面 / 维护界面）与并网容量
  - PPA 电价结构（基础电价 + 偏差考核 + 辅助服务收益）
  - 弃风 / 弃光 / 限电的责任划分与补偿机制
  - 绿证 / CCER / 配额的归属（业主 vs 投资人）
  - 设备保证：性能保证（PR）、可利用率、衰减率（首年 / 逐年）
  - 全生命周期运维（O&M）的覆盖范围与免责
  - 调度协议中"应付未付电量"的结算口径
  - 长协气 / 长协电的最低提取量（MQT）与照付不议（Take-or-Pay）条款
  - 油气分成（PSC）下成本回收 / 利润油分配
  - 燃料价格波动、汇率波动、政策变化的风险分配
priority_overrides:
  违约金: 高
  并网: 高
  调度: 高
  绿证: 高
