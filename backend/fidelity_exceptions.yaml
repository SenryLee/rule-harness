# 数值忠实度校验的例外清单
#
# 用途：第五重门（忠实度）默认要求 requirement / check_item / notes 中出现的
# 每一个数字都能在原文里找到。但有些数字属于"语义常量"，不应参与校验：
#   - 0 / 1 / 2 这种常用泛指（如"两份原件""一项要求"）
#   - 24 小时 / 7 天 这种常识性表述
#
# 编辑规则：
#   - "auto_skip_integers" 控制自动跳过的小整数上限。≤ 此值的纯整数（不带单位）
#     不参与校验。默认 2。
#   - "tokens" 是逐字符匹配的字符串列表；命中即跳过。
#   - "patterns" 是 regex 模式列表；命中即跳过。

auto_skip_integers: 2

tokens:
  # 通用泛指
  - "0"
  - "1"
  - "2"
  # 常识时间
  - "24 小时"
  - "24小时"
  - "7 天"
  - "7天"
  - "365 天"
  - "365天"
  - "12 个月"
  - "12个月"
  # 法定基准（中国大陆常用）
  - "18 周岁"
  - "18周岁"
  - "60 周岁"
  - "60周岁"

patterns:
  # 标点 / 编号（"第 1 条""第二款"等并非阈值）
  - '第\s*[一二三四五六七八九十百千]+\s*[条款项章节]'
  - '第\s*\d+\s*[条款项章节]'
  # 法律编号引用（《xxx法》第 X 条 后跟的数字）
  - '\(\d{4}\)'
  # 年份（19xx / 20xx）
  - '\b(19|20)\d{2}\b'
