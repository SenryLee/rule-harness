# 统一分类词表（v1.2 批次④）
# classifier.py（体裁预筛）与 preview.py（来源标签）从这一份加载；改词表只改这里。
#
# genre_rules: 7 体裁关键词预筛（带反向信号）
# source_rules: 来源标签建议（公司红线/标准条款库/法规/合同模板/内部制度/案例）

genre_rules:
  - genre: 已有规则库
    # v1.2 补：审核/审查指引、合同审查手册类文件是现成的审查口径库（→标准条款库），
    # 不应落到"专业参考资料"
    filename_kw: [规则, 规则库, 审查清单, 审查意见, 审核要点, 规则项导入, 审查手册, 审核指引, 审查指引, 合同审核, 合同审查, 审核手册]
    body_kw: [规则项id, 规则编号, 检查项, 审查要求, 风险等级, 是否启用]
    suffixes: [.csv, .tsv]
    weight: 6

  # 专业参考资料优先级提高：「手册」「指引」「风控」等优先命中参考资料
  - genre: 专业参考资料
    filename_kw: [手册, 指南, 操作指引, 风控, 风险提示, 教程, 培训, 讲义, 论文, 报告, 研究, 书籍, 实务, 律师办理, 业务操作]
    body_kw: [编委会, 主编, 撰稿人, 律师事务所, 律师协会, 摘要, 参考文献, 目录, 第一章, 引言, 风险提示, 防范措施, 建议, 实务要点]
    weight: 5

  - genre: 裁判文书
    filename_kw: [判决书, 裁定书, 民事判决, 刑事判决, 行政判决, 仲裁裁决, 纠纷案, 抗诉, 再审]
    body_kw: [判决如下, 裁定如下, 本院认为, 原告, 被告, 上诉人, 被上诉人, 仲裁庭, 驳回]
    anti_filename_kw: [手册, 指引, 指南, 操作, 风控, 风险提示, 培训]
    weight: 5

  - genre: 法律法规
    filename_kw: [中华人民共和国, 公司法, 民法典, 合同法, 条例, 细则]
    body_kw: [全国人民代表大会, 主席令, 中华人民共和国, 自公布之日起施行]
    anti_filename_kw: [手册, 指引, 指南, 操作, 律师, 风控, 相关]
    weight: 5

  - genre: 监管与司法文件
    filename_kw: [司法解释, 答记者问, 通知, 办法, 规定, 证监会, 财政部, 国资委, 裁判指引]
    body_kw: [最高人民法院, 司法解释, 法释, 解释如下, 证监会, 财政部, 国资委, 各省, 印发]
    anti_filename_kw: [手册, 操作指引, 律师, 风控]
    weight: 4

  - genre: 企业内部文件
    filename_kw: [制度, 红线, 底线, 内控, 操作规程, 管理规范, 流程, 谈判清单, 审批, 不可接受]
    body_kw: [红线, 底线, 不可接受, 内部制度, 内控, 审批流程, 公司规定, 操作规程]
    weight: 3

  - genre: 合同文本
    filename_kw: [合同, 协议, 补充协议, 模板, 范本, 示范文本]
    body_kw: [甲方, 乙方, 违约责任, 争议解决, 合同生效, 签章, 盖章, 鉴于]
    anti_filename_kw: [手册, 指引, 指南, 律师办理, 操作, 风控]
    weight: 2

source_rules:
  - label: 公司红线
    filename: [红线, 底线, 退让, 不可接受, 谈判清单]
    body: [红线, 底线, 不可接受]
    reason: 命中红线/底线类来源线索

  - label: 标准条款库
    filename: [手册, 指引, 指南, 规范, 审核要点, 审查清单, 合同审查, 规则项导入, 审查意见]
    body: [审核要点, 审查清单, 规则项, 标准条款]
    reason: 命中审查手册/规则库类来源线索

  - label: 法规
    filename: [法律法规, 法律, 法规, 条例, 办法, 司法解释, 规定, 细则, 规程]
    body: [法律法规, 法规, 条例, 司法解释, 应当遵守]
    reason: 命中法规/细则类来源线索

  - label: 合同模板
    filename: [模板, 范本, 示范文本, 合同样本]
    body: [模板, 范本, 示范文本]
    reason: 命中模板/范本类来源线索

  - label: 内部制度
    filename: [制度, 流程, 内控, 操作规程, 管理规范]
    body: [内部制度, 内控, 操作流程]
    reason: 命中制度/流程类来源线索

  - label: 案例
    filename: [案例, 判例, 判决, 裁判, 纠纷案, 抗诉案, 检例, 再审, 民事判决]
    body: [案例, 判例, 法院认为, 裁判观点]
    reason: 命中案例/裁判类来源线索
