        desc: 同步抽取：阻塞到完成直接返回规则 JSON（仅适合1-2个中小文件；多文件请走异步）
        headers: ''
        method: post
        params: ''
        retry_config:
          max_retries: 1
          retry_enabled: false
          retry_interval: 1000
        selected: false
        ssl_verify: true
