        body:
          data:
          - id: 9a2b4c6d-1e2f-4a5b-8c9d-0e1f2a3b4c5d
            key: text
            type: text
            value: '{{#1781000000102.text#}}'
          type: form-data
        desc: 异步提交抽取，秒回 batch_id（不阻塞，Cloudflare 不会超时）
        headers: ''
        method: post
        params: ''
        retry_config:
          max_retries: 2
          retry_enabled: false
          retry_interval: 1000
        selected: false
        ssl_verify: true
        timeout:
          max_connect_timeout: 30
          max_read_timeout: 60
          max_write_timeout: 30
        title: 提交抽取（异步）
        type: http-request
        url: https://api-rules.448898.xyz/api/dify/upload
        variables: []
      height: 130
      id: '1781000000107'
      position:
        x: 990
        y: 460
      positionAbsolute:
        x: 990
        y: 460
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: |
          import json

          def main(arg1: str) -> dict:
              base = "https://api-rules.448898.xyz"
              text = (arg1 or "").strip()
              try:
                  data = json.loads(text)
              except Exception:
                  data = {}
              bid = str(data.get("batch_id", ""))
              if not bid:
                  return {
                      "ok": False,
                      "batch_id": "",
                      "status_url": "",
                      "rules_url": "",
                      "report_markdown": (
                          "# 提交失败\n\n后端未返回 batch_id。原始返回（前500字）：\n\n```\n"
                          + text[:500] + "\n```"
                      ),
                  }
              status_url = base + "/api/dify/batches/" + bid + "/status"
              rules_url = base + "/api/dify/batches/" + bid + "/rules.json"
              md = "\n".join([
                  "# 已提交后台抽取",
                  "",
                  "- 批次：`" + bid + "`",
                  "- 抽取正在后台进行，本工作流不阻塞等待。",
                  "",
                  "## 获取结果的三种方式",
                  "",
                  "1. 网页后台（推荐）：https://api-rules.448898.xyz —— 实时进度、规则预览、CSV 导出、生成 Skill",
                  "2. 查状态：`GET " + status_url + "`（status=success/partial 即完成）",
                  "3. 取规则：`GET " + rules_url + "`（完成后返回规则 JSON；进行中返回 409）",
              ])
              return {
                  "ok": True,
                  "batch_id": bid,
                  "status_url": status_url,
                  "rules_url": rules_url,
                  "report_markdown": md,
              }
        code_language: python3
        desc: 取出 batch_id，拼查状态/取规则地址 + 使用说明
        outputs:
          batch_id:
            children: null
            type: string
          ok:
            children: null
            type: boolean
          report_markdown:
            children: null
            type: string
          rules_url:
            children: null
            type: string
          status_url:
            children: null
            type: string
        selected: false
        title: 解析batch_id
        type: code
        variables:
        - value_selector:
          - '1781000000107'
          - body
          variable: arg1
      height: 52
      id: '1781000000108'
      position:
        x: 1310
        y: 460
      positionAbsolute:
        x: 1310
        y: 460
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        outputs:
        - value_selector:
          - '1781000000108'
          - report_markdown
          value_type: string
          variable: report_markdown
        - value_selector:
          - '1781000000108'
          - batch_id
          value_type: string
          variable: batch_id
        - value_selector:
