          max_connect_timeout: 30
          max_read_timeout: 600
          max_write_timeout: 60
        title: 同步抽取
        type: http-request
        url: https://api-rules.448898.xyz/api/dify/extract
        variables: []
      height: 130
      id: '1781000000104'
      position:
        x: 990
        y: 160
      positionAbsolute:
        x: 990
        y: 160
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: |
          import json

          def main(arg1: str) -> dict:
              text = (arg1 or "").strip()
              try:
                  data = json.loads(text)
              except Exception:
                  return {
                      "ok": False,
                      "batch_id": "",
                      "total_rules": 0,
                      "rules_json": "[]",
                      "report_markdown": (
                          "# 规则抽取失败\n\n后端未返回有效 JSON。"
                          "可能原因：任务超过网关时长被掐断（请改用『后台批量（异步）』模式）、"
                          "或后端异常。原始返回（前500字）：\n\n```\n" + text[:500] + "\n```"
                      ),
                  }

              rules = data.get("rules") or []
              batch_id = str(data.get("batch_id", ""))
              status = str(data.get("status", ""))
              total = len(rules)

              risk_order = {"高": 0, "中": 1, "低": 2}
              rules_sorted = sorted(
                  rules,
                  key=lambda r: risk_order.get(str(r.get("risk_level", "中")), 1),
              )
              by_risk = {"高": 0, "中": 0, "低": 0}
              for r in rules:
                  lv = str(r.get("risk_level", "中"))
                  by_risk[lv] = by_risk.get(lv, 0) + 1

              lines = []
              lines.append("# 规则抽取报告")
              lines.append("")
              lines.append("- 批次：`" + batch_id + "`（状态：" + status + "）")
              lines.append(
                  "- 规则总数：**" + str(total) + "**"
                  "（高 " + str(by_risk.get("高", 0))
                  + " / 中 " + str(by_risk.get("中", 0))
                  + " / 低 " + str(by_risk.get("低", 0)) + "）"
              )
              lines.append(
                  "- 网页后台：https://api-rules.448898.xyz （可查看本批次、导出 CSV、生成 Skill）"
              )
              lines.append("")

              high = [r for r in rules_sorted if str(r.get("risk_level")) == "高"]
              rest = [r for r in rules_sorted if str(r.get("risk_level")) != "高"]

              if high:
                  lines.append("## 一、高风险规则（含三要素）")
                  lines.append("")
                  for i, r in enumerate(high[:100], 1):
                      lines.append(
                          "### " + str(i) + ". " + str(r.get("check_item", ""))
                          + "（`" + str(r.get("rule_id", "")) + "`）"
                      )
                      lines.append("")
                      lines.append("- **审查要求**：" + str(r.get("requirement", "")))
                      if r.get("assumption"):
                          lines.append("- **假定条件**：" + str(r.get("assumption", "")))
                      if r.get("behavior_mode"):
                          lines.append("- **行为模式**：" + str(r.get("behavior_mode", "")))
                      if r.get("consequence"):
                          lines.append("- **法律后果**：" + str(r.get("consequence", "")))
                      if r.get("notes"):
                          lines.append("- 说明：" + str(r.get("notes", "")))
                      lines.append(
                          "- 来源：" + str(r.get("source_file", ""))
                          + "｜置信 " + str(round(float(r.get("combined_confidence", 0) or 0), 2))
                      )
                      lines.append("")

              if rest:
                  lines.append("## 二、中/低风险规则一览")
                  lines.append("")
                  lines.append("| # | 风险 | 检查项 | 审查要求 | 法律后果 |")
                  lines.append("|---|---|---|---|---|")
                  for i, r in enumerate(rest[:200], 1):
                      req = str(r.get("requirement", "")).replace("|", "／").replace("\n", " ")
                      cons = str(r.get("consequence", "")).replace("|", "／").replace("\n", " ")
                      ci = str(r.get("check_item", "")).replace("|", "／")
                      lines.append(
                          "| " + str(i) + " | " + str(r.get("risk_level", ""))
                          + " | " + ci + " | " + req[:120] + " | " + cons[:80] + " |"
                      )
                  if len(rest) > 200:
                      lines.append("")
                      lines.append("（其余 " + str(len(rest) - 200) + " 条见 rules_json 或网页后台）")
                  lines.append("")

              if total == 0:
                  lines.append("> 本批未抽取到规则。可能输入为纯背景性文本，")
                  lines.append("> 或被忠实度/占位门拦截——到网页后台查看 skipped/placeholders 明细。")

              return {
                  "ok": status in ("success", "partial"),
                  "batch_id": batch_id,
                  "total_rules": total,
                  "rules_json": json.dumps(rules, ensure_ascii=False),
                  "report_markdown": "\n".join(lines),
              }
        code_language: python3
        desc: 解析规则 JSON → 生成含三要素的 Markdown 报告
        outputs:
          batch_id:
            children: null
            type: string
          ok:
            children: null
            type: boolean
          report_markdown:
            children: null
            type: string
          rules_json:
            children: null
            type: string
          total_rules:
            children: null
            type: number
        selected: false
        title: 生成规则报告
        type: code
        variables:
        - value_selector:
          - '1781000000104'
          - body
          variable: arg1
      height: 52
      id: '1781000000105'
      position:
        x: 1310
        y: 160
      positionAbsolute:
        x: 1310
        y: 160
      selected: false
      sourcePosition: right
      targetPosition: left
