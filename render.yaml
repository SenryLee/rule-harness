services:
  - type: web
    name: rule-harness-demo
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python3 -m uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    domains:
      - rules.448898.xyz
    envVars:
      - key: PORT
        value: "10000"
